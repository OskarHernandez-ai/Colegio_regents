<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Materias | Academia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #581c87; /* Púrpura oscuro profesional */
            --accent: #a855f7;  /* Violeta para materias */
            --bg: #f9fafb;
            --card: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 340px;
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 40px 25px;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.01);
        }

        .sidebar h2 {
            font-size: 1.4rem;
            margin-bottom: 30px;
            color: var(--primary);
            letter-spacing: -0.025em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.95rem;
            background: #fdfdff;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.1);
        }

        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-save:hover {
            background: #4c1d95;
            transform: translateY(-1px);
        }

        /* MAIN CONTENT */
        .main-content {
            margin-left: 340px;
            flex: 1;
            padding: 50px 60px;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .btn-back:hover { background: #f3f4f6; color: var(--text-main); }

        /* TABLA MODERNA */
        .table-card {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f9fafb;
            padding: 16px 24px;
            text-align: left;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }

        .subject-name {
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subject-name::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
        }

        .id-pill {
            background: #f3e8ff;
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* ACCIONES */
        .btn-action {
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: white;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            margin-right: 5px;
            transition: all 0.2s;
        }

        .edit:hover { background: #f5f3ff; color: var(--primary); border-color: #ddd6fe; }
        .delete:hover { background: #fff1f2; color: #e11d48; border-color: #fecdd3; }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; position: relative; height: auto; border-right: none; }
            .main-content { margin-left: 0; padding: 30px 20px; }
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <h2 id="form-title">Nueva Materia</h2>
        
        <div class="form-group">
            <label>Nombre de la Asignatura</label>
            <input id="nombre_materia" placeholder="Ej. Programación Web II">
        </div>

        <button class="btn-save" onclick="guardarMateria()">Registrar Materia</button>
        <p id="edit-tag" style="display:none; color: var(--accent); font-size: 12px; margin-top: 15px; font-weight: 600;">
            ✨ Editando materia seleccionada
        </p>
    </aside>

    <main class="main-content">
        <header class="header-area">
            <h1>Plan de Estudios</h1>
            <a href="dashboard.html" class="btn-back">← Regresar</a>
        </header>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th width="100">Código</th>
                        <th>Nombre de Materia</th>
                        <th width="180">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaMaterias">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        let editando = false;
        let idEditar = null;

        async function cargarMaterias(){
            try {
                const response = await fetch("http://localhost:3000/materias");
                const data = await response.json();
                const tabla = document.getElementById("tablaMaterias");
                tabla.innerHTML = "";

                data.forEach(materia => {
                    tabla.innerHTML += `
                    <tr>
                        <td><span class="id-pill">#${materia.id_materia}</span></td>
                        <td><div class="subject-name">${materia.nombre_materia}</div></td>
                        <td>
                            <button class="btn-action edit" onclick="editarMateria(${materia.id_materia},'${materia.nombre_materia}')">Editar</button>
                            <button class="btn-action delete" onclick="eliminarMateria(${materia.id_materia})">Borrar</button>
                        </td>
                    </tr>
                    `;
                });
            } catch (e) { console.error("Error cargando materias", e); }
        }

        async function guardarMateria(){
            const nombre_materia = document.getElementById("nombre_materia").value;
            if(!nombre_materia) return alert("Escribe el nombre de la materia");

            const url = editando ? `http://localhost:3000/materias/${idEditar}` : "http://localhost:3000/materias";
            const method = editando ? "PUT" : "POST";

            await fetch(url, {
                method: method,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nombre_materia })
            });

            editando = false;
            idEditar = null;
            document.getElementById("form-title").innerText = "Nueva Materia";
            document.getElementById("edit-tag").style.display = "none";
            
            limpiar();
            cargarMaterias();
        }

        function editarMateria(id, nombre){
            document.getElementById("nombre_materia").value = nombre;
            editando = true;
            idEditar = id;
            document.getElementById("form-title").innerText = "Editar Materia";
            document.getElementById("edit-tag").style.display = "block";
            document.getElementById("nombre_materia").focus();
        }

        async function eliminarMateria(id){
            if(confirm("¿Seguro que deseas eliminar esta materia?")) {
                await fetch(`http://localhost:3000/materias/${id}`, { method: "DELETE" });
                cargarMaterias();
            }
        }

        function limpiar(){
            document.getElementById("nombre_materia").value = "";
        }

        cargarMaterias();
    </script>
</body>
</html>
