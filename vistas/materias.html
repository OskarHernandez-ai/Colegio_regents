<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Materias | Academia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #581c87;
            --accent: #a855f7;
            --bg: #f9fafb;
            --card: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 340px;
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 40px 25px;
            position: fixed;
            height: 100vh;
        }

        .sidebar h2 {
            font-size: 1.4rem;
            margin-bottom: 30px;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.95rem;
            background: #fdfdff;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.1);
        }

        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .btn-save:hover {
            background: #4c1d95;
        }

        .main-content {
            margin-left: 340px;
            flex: 1;
            padding: 50px 60px;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 8px;
        }

        .btn-back:hover {
            background: #f3f4f6;
        }

        .table-card {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f9fafb;
            padding: 16px 24px;
            text-align: left;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }

        .subject-name {
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subject-name::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
        }

        .id-pill {
            background: #f3e8ff;
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .btn-action {
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: white;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            margin-right: 5px;
        }

        .edit:hover {
            background: #f5f3ff;
            color: var(--primary);
        }
        
        .delete:hover {
            background: #fff1f2;
            color: #e11d48;
        }

        #edit-tag {
            display: none;
            color: var(--accent);
            font-size: 12px;
            margin-top: 15px;
            font-weight: 600;
            text-align: center;
        }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; position: relative; height: auto; }
            .main-content { margin-left: 0; padding: 30px 20px; }
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <h2 id="form-title">Nueva Materia</h2>
        
        <div class="form-group">
            <label>Nombre de la Asignatura</label>
            <input id="nombre_materia">
        </div>

        <button class="btn-save" onclick="guardarMateria()">Registrar Materia</button>
        <p id="edit-tag">Editando materia seleccionada</p>
    </aside>

    <main class="main-content">
        <header class="header-area">
            <h1>Plan de Estudios</h1>
            <a href="dashboard.html" class="btn-back">← Regresar</a>
        </header>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th width="100">Código</th>
                        <th>Nombre de Materia</th>
                        <th width="180">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaMaterias">
                    <!-- Se cargan las materias -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        // URL del archivo conectado a la base de datos (php)
        const API_URL = "../backend/materias.php";
        
        let editando = false;
        let idEditar = null;

        // Función para CARGAR materias
        async function cargarMaterias(){
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const tabla = document.getElementById("tablaMaterias");
                tabla.innerHTML = "";

                data.forEach(materia => {
                    tabla.innerHTML += `
                    <tr>
                        <td><span class="id-pill">#${materia.id_materia}</span></td>
                        <td><div class="subject-name">${materia.nombre_materia}</div></td>
                        <td>
                            <button class="btn-action edit" onclick="editarMateria(${materia.id_materia}, '${materia.nombre_materia.replace(/'/g, "\\'")}')">Editar</button>
                            <button class="btn-action delete" onclick="eliminarMateria(${materia.id_materia})">Borrar</button>
                        </td>
                    </tr>
                    `;
                });
            } catch (e) { 
                console.error("Error cargando materias", e);
                alert("Error al cargar las materias");
            }
        }

        // Función para GUARDAR (nueva o editar)
        async function guardarMateria(){
            const nombre_materia = document.getElementById("nombre_materia").value;
            
            if(!nombre_materia) {
                alert("Escribe el nombre de la materia");
                return;
            }

            // Si está editando, usa PUT con ID, si no, usa POST
            const url = editando ? `${API_URL}?id=${idEditar}` : API_URL;
            const method = editando ? "PUT" : "POST";

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ nombre_materia: nombre_materia })
                });

                const result = await response.json();
                
                if(result.success) {
                    // Resetear formulario
                    editando = false;
                    idEditar = null;
                    document.getElementById("form-title").innerText = "Nueva Materia";
                    document.getElementById("edit-tag").style.display = "none";
                    
                    limpiar();
                    cargarMaterias();
                } else {
                    alert("Error: " + result.error);
                }
            } catch (error) {
                alert("Error de conexión: " + error);
            }
        }

        // Función para edit
        function editarMateria(id, nombre){
            document.getElementById("nombre_materia").value = nombre;
            editando = true;
            idEditar = id;
            document.getElementById("form-title").innerText = "Editar Materia";
            document.getElementById("edit-tag").style.display = "block";
            document.getElementById("nombre_materia").focus();
        }

        // Función para delete 
        async function eliminarMateria(id){
            if(confirm("¿Seguro que deseas eliminar esta materia?")) {
                try {
                    const response = await fetch(`${API_URL}?id=${id}`, { 
                        method: "DELETE" 
                    });
                    const result = await response.json();
                    
                    if(result.success) {
                        cargarMaterias();
                    } else {
                        alert("Error: " + result.error);
                    }
                } catch (error) {
                    alert("Error de conexión: " + error);
                }
            }
        }

        // Función para limpiar el formulario
        function limpiar(){
            document.getElementById("nombre_materia").value = "";
        }

        // Cargar materias al iniciar la página
        cargarMaterias();
    </script>

</body>
</html>
