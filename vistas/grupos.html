<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Grupos | Administración</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0369a1;
            --accent: #0ea5e9;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 340px;
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 40px 25px;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.02);
            z-index: 100;
        }

        .sidebar h2 {
            font-size: 1.4rem;
            margin-bottom: 30px;
            color: var(--primary);
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.95rem;
            background: #fdfdff;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
        }

        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-save:hover {
            background: #075985;
            transform: translateY(-1px);
        }

        .main-content {
            margin-left: 340px;
            flex: 1;
            padding: 50px 60px;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn-back:hover { background: #f1f5f9; color: var(--text-main); }

        .table-card {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            padding: 16px 24px;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        tr:last-child td { border-bottom: none; }

        .group-tag {
            background: #e0f2fe;
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .cuatri-text {
            color: var(--text-muted);
            font-weight: 500;
        }

        .actions-flex {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: white;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .edit:hover { background: #f0f9ff; color: var(--primary); border-color: #bae6fd; }
        .delete:hover { background: #fff1f2; color: #be123c; border-color: #fecdd3; }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; position: relative; height: auto; border-right: none; }
            .main-content { margin-left: 0; padding: 30px 20px; }
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <h2 id="form-title">Registrar Grupo</h2>
        
        <div class="form-group">
            <label>Nombre del grupo</label>
            <input id="nombre_grupo">
        </div>

        <div class="form-group">
            <label>Periodo / Cuatrimestre</label>
            <input id="cuatrimestre">
        </div>

        <button class="btn-save" onclick="guardarGrupo()">Guardar Cambios</button>
        <p id="edit-notice" style="display:none; color: var(--accent); font-size: 12px; margin-top: 15px; font-weight: 600;">
            🛠️ Editando grupo...
        </p>
    </aside>

    <main class="main-content">
        <header class="header-area">
            <h1>Control de Grupos</h1>
            <a href="dashboard.html" class="btn-back">← Menú Principal</a>
        </header>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th width="80">ID</th>
                        <th>Nombre del Grupo</th>
                        <th>Periodo</th>
                        <th width="180">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaGrupos"></tbody>
            </table>
        </div>
    </main>

    <script>
        // ✅ Constante con la URL correcta del backend
        const API_URL = "../backend/grupos.php";
        
        let editando = false;
        let idEditar = null;

        // Función para CARGAR grupos
        async function cargarGrupos(){
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const tabla = document.getElementById("tablaGrupos");
                tabla.innerHTML = "";

                if (data.length === 0) {
                    tabla.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 20px;">No hay grupos registrados</td></tr>';
                    return;
                }

                data.forEach(grupo => {
                    tabla.innerHTML += `
                    <tr>
                        <td><span style="color:#94a3b8; font-size: 0.8rem;">#${grupo.id_grupo}</span></td>
                        <td><span class="group-tag">${grupo.nombre_grupo}</span></td>
                        <td><span class="cuatri-text">${grupo.cuatrimestre}</span></td>
                        <td>
                            <div class="actions-flex">
                                <button class="btn-action edit" onclick="editarGrupo(${grupo.id_grupo}, '${grupo.nombre_grupo.replace(/'/g, "\\'")}', '${grupo.cuatrimestre.replace(/'/g, "\\'")}')">Editar</button>
                                <button class="btn-action delete" onclick="eliminarGrupo(${grupo.id_grupo})">Borrar</button>
                            </div>
                        </td>
                    </tr>
                    `;
                });
            } catch (error) { 
                console.error("Error al cargar:", error);
                alert("Error al cargar los grupos");
            }
        }

        // Función para GUARDAR (nuevo o editar)
        async function guardarGrupo(){
            const nombre_grupo = document.getElementById("nombre_grupo").value.trim();
            const cuatrimestre = document.getElementById("cuatrimestre").value.trim();

            if(!nombre_grupo || !cuatrimestre) {
                alert("Completa todos los campos");
                return;
            }

            // ✅ Construir URL y método correctamente
            const url = editando ? `${API_URL}?id=${idEditar}` : API_URL;
            const method = editando ? "PUT" : "POST";

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ nombre_grupo, cuatrimestre })
                });

                const result = await response.json();
                
                if (result.success) {
                    // Resetear formulario
                    editando = false;
                    idEditar = null;
                    document.getElementById("form-title").innerText = "Registrar Grupo";
                    document.getElementById("edit-notice").style.display = "none";
                    
                    limpiar();
                    cargarGrupos();
                } else {
                    alert("Error: " + result.error);
                }
            } catch (error) {
                console.error("Error al guardar:", error);
                alert("Error de conexión");
            }
        }

        // Función para EDITAR (prepara el formulario)
        function editarGrupo(id, nombre, cuatri){
            document.getElementById("nombre_grupo").value = nombre;
            document.getElementById("cuatrimestre").value = cuatri;

            editando = true;
            idEditar = id;
            document.getElementById("form-title").innerText = "Actualizar Grupo";
            document.getElementById("edit-notice").style.display = "block";
            document.getElementById("nombre_grupo").focus();
        }

        // Función para ELIMINAR
        async function eliminarGrupo(id){
            if(confirm("¿Deseas dar de baja este grupo?")) {
                try {
                    const response = await fetch(`${API_URL}?id=${id}`, { 
                        method: "DELETE" 
                    });
                    const result = await response.json();
                    
                    if (result.success) {
                        cargarGrupos();
                    } else {
                        alert("Error: " + result.error);
                    }
                } catch (error) {
                    console.error("Error al eliminar:", error);
                    alert("Error de conexión");
                }
            }
        }

        function limpiar(){
            document.getElementById("nombre_grupo").value = "";
            document.getElementById("cuatrimestre").value = "";
        }

        // Cargar grupos al iniciar
        cargarGrupos();
    </script>
</body>
</html>
