<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Maestros | Panel</title>
    <style>
        :root{
            --primary:#0f172a;
            --accent:#10b981;
            --bg:#f8fafc;
            --text-main:#1e293b;
            --text-muted:#64748b;
            --border:#e2e8f0;
        }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
        body{background:var(--bg);display:flex;min-height:100vh;}
        .sidebar{width:350px;background:white;padding:40px;border-right:1px solid var(--border);position:fixed;height:100%;}
        .form-group{margin-bottom:15px;}
        label{font-size:12px;font-weight:bold;color:var(--text-muted);}
        input{width:100%;padding:10px;border:1px solid var(--border);border-radius:6px;margin-top:5px;}
        .btn-save{width:100%;padding:12px;border:none;background:var(--primary);color:white;border-radius:6px;cursor:pointer;margin-top:10px;}
        .main-content{margin-left:350px;padding:40px;flex:1;}
        .search{margin-bottom:20px;padding:10px;width:300px;border-radius:6px;border:1px solid var(--border);}
        table{width:100%;border-collapse:collapse;background:white;}
        th{background:#f1f5f9;padding:14px;text-align:left;font-size:13px;}
        td{padding:14px;border-bottom:1px solid var(--border);}
        .btn-edit{background:#22c55e;color:white;padding:6px 10px;border:none;border-radius:6px;cursor:pointer;margin-right:5px;}
        .btn-delete{background:#ef4444;color:white;padding:6px 10px;border:none;border-radius:6px;cursor:pointer;}
    </style>
</head>
<body>
 
<aside class="sidebar">
    <h2 id="titulo">Registrar Maestro</h2>
    <div class="form-group">
        <label>Nombre</label>
        <input id="nombre" type="text">
    </div>
    <div class="form-group">
        <label>Correo</label>
        <input id="correo" type="email">
    </div>
    <div class="form-group">
        <label>ID Usuario</label>
        <input id="id_usuario" type="number" value="1">
    </div>
    <button class="btn-save" onclick="guardarMaestro()">Guardar</button>
</aside>
 
<main class="main-content">
    <h1>Plantilla Docente</h1>
    <input class="search" id="buscador" placeholder="Buscar maestro..." onkeyup="filtrar()">
    <table>
        <thead>
            <tr><th>ID</th><th>Nombre</th><th>Correo</th><th>Usuario ID</th><th>Acciones</th></tr>
        </thead>
        <tbody id="tablaMaestros"></tbody>
    </table>
</main>
 
<script>
const API = "../backend/maestros.php";
let maestros = [];
let editando = false;
let idEditar = null;
 
async function cargarMaestros() {
    const res = await fetch(API);
    maestros = await res.json();
    mostrar(maestros);
}
 
function mostrar(lista) {
    const tabla = document.getElementById("tablaMaestros");
    tabla.innerHTML = lista.map(m => `
        <tr>
            <td>${m.id_maestro}</td>
            <td>${m.nombre}</td>
            <td>${m.correo}</td>
            <td>${m.id_usuario}</td>
            <td>
                <button class="btn-edit" onclick="editar(${m.id_maestro},'${m.nombre}','${m.correo}',${m.id_usuario})">Editar</button>
                <button class="btn-delete" onclick="eliminar(${m.id_maestro})">Eliminar</button>
            </td>
        </tr>
    `).join('');
}
 
async function guardarMaestro() {
    const nombre = document.getElementById("nombre").value.trim();
    const correo = document.getElementById("correo").value.trim();
    const id_usuario = document.getElementById("id_usuario").value;
   
    if(!nombre || !correo) return alert("Complete los campos");
 
    const f = new FormData();
    f.append("nombre", nombre);
    f.append("correo", correo);
    f.append("id_usuario", id_usuario);
 
    if(editando){
        f.append("id", idEditar);
        f.append("accion", "editar");
    } else {
        f.append("accion", "guardar");
    }
 
    await fetch(API, { method: "POST", body: f });
    limpiar();
    cargarMaestros();
}
 
function editar(id, nombre, correo, id_user){
    editando = true;
    idEditar = id;
    document.getElementById("nombre").value = nombre;
    document.getElementById("correo").value = correo;
    document.getElementById("id_usuario").value = id_user;
    document.getElementById("titulo").innerText = "Editar Maestro";
}
 
async function eliminar(id){
    if(confirm("¿Eliminar maestro?")){
        await fetch(API+"?id="+id, { method: "DELETE" });
        cargarMaestros();
    }
}
 
function limpiar(){
    editando = false;
    idEditar = null;
    document.getElementById("nombre").value = "";
    document.getElementById("correo").value = "";
    document.getElementById("titulo").innerText = "Registrar Maestro";
}
 
function filtrar(){
    const texto = document.getElementById("buscador").value.toLowerCase();
    const filtrados = maestros.filter(m => m.nombre.toLowerCase().includes(texto) || m.correo.toLowerCase().includes(texto));
    mostrar(filtrados);
}
 
cargarMaestros();
</script>
</body>
</html>
